name: Integration Test

on: 
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
      - name: Install dependencies
        run: dotnet restore ./src/MealPlanner/MealPlanner.Tests
      - name: Build test project
        run: dotnet build ./src/MealPlanner/MealPlanner.Tests --no-restore
      - name: Test
        run: dotnet test ./src/MealPlanner/MealPlanner.Tests --no-build
  
