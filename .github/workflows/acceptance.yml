name: Build and run e2e acceptance tests against a live database

on:
  push:
    branches:
      - setup-staging

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'
      - name: Restore dependencies
        run: dotnet restore ./src/MealPlanner/MealPlanner.Tests/MealPlanner.IntegrationTests.csproj
      - name: Build test project
        run: dotnet build --no-restore ./src/MealPlanner/MealPlanner.IntegrationTests/Mealplanner.IntegrationTests.csproj
      - name: Workflow Queue
        uses: ahmadnassri/action-workflow-queue@v1.2.0
        with:
            timeout: 900000
      # only runs additional steps if there is no other instance of `acceptance.yml` currently running
      - name: Test
        run: dotnet test --no-build ./src/MealPlanner/MealPlanner.Tests/Mealplanner.Tests.csproj -e ConnectionString='${{ secrets.TESTING_CONNECTIONSTRING }}'
